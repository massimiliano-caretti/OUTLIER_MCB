name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: pip install -e ".[test]"

      - name: Unit + eval tests
        run: python -m pytest -q

      - name: Eval harness (GSL_FULL must beat BASE_PROMPT)
        run: python -m evals.run_eval

      - name: Readiness gate (must be GO_READY)
        run: python -m OUTLIER_MCB.cli readiness

      - name: Frontier anti-regression (never lower a certified result)
        run: python -m evals.frontier_regression
